<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>darkvoyager@portfolio:~$</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600&display=swap');

  :root {
    --bg-primary: #0d0f12;
    --bg-secondary: #111418;
    --bg-tertiary: #161b22;
    --bg-titlebar: #1a1f28;
    --green: #39d353;
    --green-dim: #238636;
    --green-bright: #56e36a;
    --cyan: #58d4e8;
    --blue: #4d9de0;
    --purple: #a78bfa;
    --yellow: #f9c74f;
    --orange: #f4845f;
    --red: #ff6b6b;
    --white: #e6edf3;
    --gray: #8b949e;
    --gray-dim: #484f58;
    --border: #30363d;
    --cursor-color: #39d353;
    --prompt-user: #39d353;
    --prompt-host: #58d4e8;
    --prompt-path: #a78bfa;
    --prompt-symbol: #e6edf3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    overflow: hidden;
  }

  /* ── WINDOW CHROME ── */
  .window {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    border: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(57, 211, 83, 0.08), 0 0 120px rgba(0,0,0,0.8);
  }

  .titlebar {
    display: flex;
    align-items: center;
    background: var(--bg-titlebar);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    user-select: none;
  }

  .dots { display: flex; gap: 8px; }
  .dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .dot:hover { opacity: 0.8; }
  .dot-red   { background: #ff5f57; }
  .dot-yellow{ background: #febc2e; }
  .dot-green { background: #28c840; }

  .title-text {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.5px;
  }

  .title-text span { color: var(--green); }

  /* ── TERMINAL BODY ── */
  .terminal {
    flex: 1;
    background: var(--bg-primary);
    overflow-y: auto;
    padding: 20px 24px;
    scroll-behavior: smooth;
  }

  .terminal::-webkit-scrollbar { width: 6px; }
  .terminal::-webkit-scrollbar-track { background: var(--bg-secondary); }
  .terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .terminal::-webkit-scrollbar-thumb:hover { background: var(--gray-dim); }

  /* ── OUTPUT LINES ── */
  .output { margin-bottom: 2px; line-height: 1.7; }
  .output.blank { height: 12px; }

  .c-green   { color: var(--green); }
  .c-cyan    { color: var(--cyan); }
  .c-blue    { color: var(--blue); }
  .c-purple  { color: var(--purple); }
  .c-yellow  { color: var(--yellow); }
  .c-orange  { color: var(--orange); }
  .c-red     { color: var(--red); }
  .c-white   { color: var(--white); }
  .c-gray    { color: var(--gray); }
  .c-dim     { color: var(--gray-dim); }

  .bold { font-weight: 700; }
  .dim  { opacity: 0.6; }

  /* ── PROMPT LINE ── */
  .prompt-line {
    display: flex;
    align-items: center;
    flex-wrap: nowrap;
    gap: 0;
    line-height: 1.8;
  }

  .prompt-user   { color: var(--prompt-user);   font-weight: 600; }
  .prompt-at     { color: var(--gray); }
  .prompt-host   { color: var(--prompt-host);   font-weight: 600; }
  .prompt-colon  { color: var(--gray); }
  .prompt-path   { color: var(--prompt-path);   font-weight: 500; }
  .prompt-symbol { color: var(--prompt-symbol); margin-left: 4px; }
  .prompt-cmd    { color: var(--green); margin-left: 8px; font-weight: 500; }

  /* ── INPUT AREA ── */
  .input-wrapper {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 8px 24px 14px;
    background: var(--bg-primary);
    border-top: 1px solid var(--border);
    gap: 0;
  }

  .input-prompt {
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    font-size: 14px;
  }

  .input-field-wrap {
    flex: 1;
    position: relative;
    margin-left: 8px;
  }

  #cmd-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    caret-color: transparent;
  }

  .cursor-block {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 9px;
    height: 1.2em;
    background: var(--cursor-color);
    pointer-events: none;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* ── NEOFETCH STYLE ── */
  .neofetch {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin: 8px 0 4px;
  }

  .neo-art {
    flex-shrink: 0;
    line-height: 0;
    display: flex;
    align-items: flex-start;
  }

  .neo-art canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .neo-info { display: flex; flex-direction: column; gap: 2px; justify-content: center; }
  .neo-row  { font-size: 13px; display: flex; gap: 8px; }
  .neo-key  { color: var(--cyan); font-weight: 600; min-width: 90px; }
  .neo-val  { color: var(--white); }

  .neo-colors { display: flex; gap: 4px; margin-top: 6px; }
  .neo-swatch {
    width: 18px; height: 18px;
    border-radius: 3px;
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    color: var(--cyan);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 3px;
    margin: 4px 0 6px;
  }

  /* ── HELP TABLE ── */
  .help-row { display: flex; gap: 0; font-size: 13px; }
  .help-cmd { color: var(--green); font-weight: 600; min-width: 120px; }
  .help-sep { color: var(--gray-dim); margin: 0 8px; }
  .help-desc{ color: var(--gray); }

  /* ── SKILL BARS ── */
  .skill-group { margin-bottom: 10px; }
  .skill-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; font-size: 13px; }
  .skill-name  { color: var(--white); min-width: 120px; }
  .skill-bar   { flex: 1; max-width: 200px; height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .skill-fill  { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); border-radius: 3px; transition: width 1s ease; }
  .skill-tag   { color: var(--green); font-size: 11px; font-weight: 600; }

  /* ── PROJECT CARD ── */
  .project-card { margin-bottom: 12px; padding: 10px 14px; border-left: 2px solid var(--green-dim); background: var(--bg-secondary); border-radius: 0 4px 4px 0; }
  .proj-title   { color: var(--yellow); font-weight: 700; font-size: 14px; }
  .proj-status  { color: var(--orange); font-size: 11px; font-weight: 600; }
  .proj-desc    { color: var(--gray); font-size: 13px; margin-top: 2px; }
  .proj-url     { color: var(--blue); font-size: 12px; text-decoration: none; margin-top: 3px; display: block; }
  .proj-url:hover { text-decoration: underline; }

  /* ── CONTACT ── */
  .contact-row { display: flex; gap: 12px; font-size: 13px; margin-bottom: 4px; }
  .contact-key { color: var(--cyan); font-weight: 600; min-width: 80px; }
  .contact-val { color: var(--white); }
  .contact-val a { color: var(--blue); text-decoration: none; }
  .contact-val a:hover { text-decoration: underline; }

  /* ── FAVORITES ── */
  .fav-row { display: flex; gap: 8px; font-size: 13px; margin-bottom: 3px; }
  .fav-key { color: var(--purple); font-weight: 600; min-width: 200px; }
  .fav-val { color: var(--white); }

  /* ── TYPING ANIMATION ── */
  .typing-line { overflow: hidden; white-space: nowrap; }

  /* ── GLITCH ── */
  @keyframes scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .terminal { padding: 10px 12px; font-size: 12px; }
    .input-wrapper { padding: 6px 12px 10px; }
    #cmd-input { font-size: 12px; }
    .input-prompt { font-size: 12px; }
    .neofetch { flex-direction: column; gap: 10px; }
    .neo-art { display: none; }
    .help-cmd { min-width: 90px; }
    .fav-key { min-width: 130px; font-size: 11px; }
    .fav-val { font-size: 11px; }
    .fav-row { flex-wrap: wrap; }
    .skill-name { min-width: 80px; font-size: 12px; }
    .skill-bar { max-width: 100px; }
    .neo-key { min-width: 70px; font-size: 12px; }
    .neo-val { font-size: 12px; }
    .neo-row { flex-wrap: wrap; }
    .title-text { font-size: 10px; }
    .project-card { padding: 8px 10px; }
    .proj-url { font-size: 11px; word-break: break-all; }
    .contact-key { min-width: 60px; }
    .contact-val { font-size: 12px; word-break: break-all; }
  }

  @media (max-width: 400px) {
    .terminal { padding: 8px 10px; }
    .dots .dot { width: 10px; height: 10px; }
    .title-text { display: none; }
  }

  /* welcome banner */
  .banner-line { color: var(--green); font-weight: 700; font-size: 13px; text-shadow: 0 0 10px rgba(57,211,83,0.5); }
</style>
</head>

<div class="window">

<script>
// ─────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const input    = document.getElementById('cmd-input');
const cursor   = document.getElementById('cursor');

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function line(html, cls = '') {
  const d = el('div', 'output ' + cls);
  d.innerHTML = html;
  terminal.appendChild(d);
}

function blank() { terminal.appendChild(el('div', 'output blank')); }

function scrollBottom() {
  requestAnimationFrame(() => { terminal.scrollTop = terminal.scrollHeight; });
}

// ─────────────────────────────────────────────
//  DYNAMIC AGE
// ─────────────────────────────────────────────
function calcAge() {
  const birth = new Date(2012, 0, 1, 8, 0, 0); // Jan 1 2012, 08:00
  const now   = new Date();
  let years   = now.getFullYear() - birth.getFullYear();
  let months  = now.getMonth()    - birth.getMonth();
  let days    = now.getDate()     - birth.getDate();
  let hours   = now.getHours()    - birth.getHours();

  if (hours < 0)  { days--;   hours  += 24; }
  if (days  < 0)  { months--; const prev = new Date(now.getFullYear(), now.getMonth(), 0); days += prev.getDate(); }
  if (months < 0) { years--;  months += 12; }

  return `${years}y ${months}m ${days}d ${hours}h`;
}

// ─────────────────────────────────────────────
//  DYNAMIC CLASS
// ─────────────────────────────────────────────
function calcClass() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth() + 1; // 1–12

  // Academic year starts in March
  // Before March 2027 → Class 9
  // March 2027 → Class 10, March 2028 → Class 11, etc.
  if (year < 2027 || (year === 2027 && month < 3)) return 9;
  const extra = (year - 2027) + (month >= 3 ? 0 : -1);
  return 10 + extra;
}

// ─────────────────────────────────────────────
//  PROMPT ECHO
// ─────────────────────────────────────────────
function echoPrompt(cmd) {
  line(`<span class="prompt-user">darkvoyager</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-symbol">$</span><span class="prompt-cmd"> ${cmd}</span>`);
}

//  COMMANDS

      ['Subject',         'Mathematics & Physics'],

  contact() {

};

// ─────────────────────────────────────────────
//  AUTOCOMPLETE
// ─────────────────────────────────────────────
const CMD_LIST = Object.keys(COMMANDS);

function autocomplete() {
  const val = input.value.trim().toLowerCase();
  if (!val) return;
  const match = CMD_LIST.find(c => c.startsWith(val));
  if (match) input.value = match;
  updateCursor();
}

// ─────────────────────────────────────────────
//  HISTORY
// ─────────────────────────────────────────────
const history = [];
let histIdx = -1;

// ─────────────────────────────────────────────
//  CURSOR POSITION
// ─────────────────────────────────────────────
function updateCursor() {
  const txt  = input.value;
  const span = document.createElement('span');
  span.style.cssText = 'visibility:hidden;white-space:pre;font-family:inherit;font-size:inherit;font-weight:inherit';
  span.textContent   = txt.substring(0, input.selectionStart);
  document.body.appendChild(span);
  cursor.style.left = span.offsetWidth + 'px';
  document.body.removeChild(span);
}

// ─────────────────────────────────────────────
//  RUN COMMAND
// ─────────────────────────────────────────────
function runCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  echoPrompt(raw.trim());

  if (!cmd) { blank(); scrollBottom(); return; }

  if (history[0] !== raw.trim()) history.unshift(raw.trim());
  histIdx = -1;

  if (COMMANDS[cmd]) {
    COMMANDS[cmd]();
  } else {
    blank();
    line(`<span class="c-red">bash: ${cmd}: command not found</span>`);
    line('<span class="c-dim">Type <span class="c-green">help</span> to see available commands.</span>');
    blank();
  }
  scrollBottom();
}

// ─────────────────────────────────────────────
//  INPUT EVENTS
// ─────────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    runCommand(input.value);
    input.value = '';
    updateCursor();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    autocomplete();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
    updateCursor();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }
    updateCursor();
  }
});

input.addEventListener('input',   updateCursor);
input.addEventListener('click',   updateCursor);
input.addEventListener('keyup',   updateCursor);

// click anywhere to focus
terminal.addEventListener('click', () => input.focus());
document.querySelector('.window').addEventListener('click', () => input.focus());

function drawTextImage(lines, opts) {
  opts = opts || {};
  const fs   = opts.fontSize   || 13;
  const lh   = opts.lineHeight || Math.round(fs * 1.5);
  const font = '"JetBrains Mono","Fira Code","Courier New",monospace';
  const pad  = opts.padding    || 4;
  const scale= window.devicePixelRatio || 2;

  const probe = document.createElement('canvas');
  const pc    = probe.getContext('2d');
  pc.font     = 'bold ' + fs + 'px ' + font;
  let maxW = 10;
  lines.forEach(function(row) {
    const w = pc.measureText(row.text).width;
    if (w > maxW) maxW = w;
  });

  const W = Math.ceil(maxW) + pad * 2 + 2;
  const H = Math.ceil(lines.length * lh) + pad * 2;

  const canvas = document.createElement('canvas');
  canvas.width  = W * scale;
  canvas.height = H * scale;
  canvas.style.width    = W + 'px';
  canvas.style.height   = H + 'px';
  canvas.style.maxWidth = '100%';
  canvas.style.display  = 'block';

  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.clearRect(0, 0, W, H);

  lines.forEach(function(row, i) {
    ctx.font      = (row.bold === false ? 'normal' : 'bold') + ' ' + fs + 'px ' + font;
    ctx.fillStyle = row.color || '#39d353';
    ctx.fillText(row.text, pad, pad + (i + 0.82) * lh);
  });
  return canvas;
}
